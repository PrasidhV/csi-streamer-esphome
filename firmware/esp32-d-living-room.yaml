substitutions:
  device_name: esp32-d-living-room
  friendly_name: ESP32-D Living Room CSI

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  build_flags:
    - "-DCONFIG_ESP_WIFI_CSI_ENABLED=y"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: "fallback123"

api:
  encryption:
    key: "JCykrvZvoeIYcyGR9nTsYCzOqucJqWIC8Klinn2LZMA="

ota:
  - platform: esphome

logger:
  level: INFO
  baud_rate: 115200

external_components:
  - source:
      type: local
      path: components

csi_streamer:
  id: csi_stream
  destination_host: "192.168.68.1"
  destination_port: 5000
  sample_rate: 100

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

status_led:
  pin: GPIO2
